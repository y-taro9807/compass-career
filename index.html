<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Compass — キャリアプラン</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="_react.js"></script>
<script src="_react-dom.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Noto Sans JP',sans-serif;
    background:#f5f5f4;
    color:#2c2b28;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility
  }
  button{font-family:inherit;cursor:pointer}
  button:focus{outline:none}

  /* ── phase transitions ── */
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .phase{animation:fadeUp .28s ease both}

  /* ── pyramid detail expand ── */
  @keyframes slideDown{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
  .pyramid-detail{animation:slideDown .2s ease both}

  /* ── button hover states ── */
  .btn-primary{transition:background .15s}
  .btn-primary:hover{background:#2c2b28 !important}
  .btn-secondary:hover{background:#f5f5f4 !important;border-color:#8f8d88 !important}
  .btn-option{transition:background .15s,border-color .15s}
  .btn-option:not(.selected):hover{background:#fafaf9 !important;border-color:#8f8d88 !important}
  .pyramid-layer{transition:opacity .12s}
  .pyramid-layer:hover{opacity:.88}
  .task-row{transition:background .1s;border-radius:3px;padding:1px 4px;margin:-1px -4px}
  .task-row:hover{background:rgba(0,0,0,.04)}
  .tab-btn{transition:color .15s}
  .btn-danger{transition:background .15s}
  .btn-danger:hover{background:#fbf3f3 !important}
  .chip{transition:background .15s,border-color .15s,color .15s}
  .chip:hover{border-color:#8f8d88}
  .icon-btn{transition:border-color .15s,background .15s}
  .icon-btn:hover{background:#fafaf9;border-color:#8f8d88}
  .cal-day{transition:filter .12s}
  .cal-day:hover{filter:brightness(.94)}
  .log-row:hover,.event-row:hover{background:rgba(0,0,0,.012)}

  /* ── tab content fade ── */
  .tab-content{animation:fadeUp .18s ease both}
  /* ── modal ── */
  @keyframes modalIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
  .modal-card{animation:modalIn .16s ease both}
  input:focus,select:focus,textarea:focus{outline:none;border-color:#525048 !important}

  /* ── responsive breakpoints ── */
  @media(max-width:700px){
    .kpi-grid{grid-template-columns:repeat(2,1fr) !important}
    .two-col{grid-template-columns:1fr !important}
    .cal-layout{grid-template-columns:1fr !important}
    .result-radar{grid-template-columns:1fr !important}
    .log-charts{grid-template-columns:1fr !important}
    .log-stats{grid-template-columns:repeat(2,1fr) !important}
    .cal-stats{grid-template-columns:1fr !important}
    .welcome-steps{grid-template-columns:1fr !important}
  }
  @media(max-width:480px){
    .kpi-grid{grid-template-columns:1fr !important}
    .tab-nav{gap:16px !important}
    .tab-btn{font-size:12px !important}
  }
</style>
</head>
<body>
<div id="root"></div>
<script src="_app.js"></script>
</body>
</html>
