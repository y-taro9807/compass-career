// ─── utility helpers ──────────────────────────────────────────────────────────
function mono(extra = '') {
  return `font-family:'Roboto Mono',monospace;${extra}`;
}

function daysUntil(year, month, day) {
  return Math.max(0, Math.ceil((new Date(year, month - 1, day) - new Date()) / 86400000));
}

function calcResultType(answers) {
  const scores = {T:0,I:0,'π':0,H:0,'━':0};
  Object.entries(answers).forEach(([qid, idx]) => {
    const t = TM[qid]?.[idx];
    if (t && scores.hasOwnProperty(t)) scores[t]++;
  });
  return Object.entries(scores).sort((a,b) => b[1]-a[1])[0][0];
}

// ─── Phase 2: Q&A ────────────────────────────────────────────────────────────
function PhaseQa({ answers, onAnswer, onBack, onNext, onFinish }) {
  const [page, setPage] = useState(0);

  const pageQs = QUESTIONS.filter(q => q.page === page);
  const canAdvance = pageQs.every(q => answers[q.id] !== undefined);
  const answered = QUESTIONS.filter(q => answers[q.id] !== undefined).length;
  const progressPct = (answered / 4 * 100) + '%';

  function advance() {
    if (!canAdvance) return;
    if (page === 0) {
      setPage(1);
      window.scrollTo(0,0);
    } else {
      onFinish();
    }
  }

  function goBack() {
    if (page === 1) { setPage(0); window.scrollTo(0,0); }
    else onBack();
  }

  const optBase = {display:'flex',alignItems:'center',gap:13,width:'100%',textAlign:'left',padding:'17px 18px',background:C.ink0,border:`0.5px solid ${C.ink3}`,borderRadius:3,fontSize:14,lineHeight:1.5,color:C.ink6,transition:'background .15s,border-color .15s,color .15s'};
  const optSel  = {...optBase,background:C.ink7,border:`0.5px solid ${C.ink7}`,color:C.ink0};
  const labBase = {...mono(),fontSize:11,flexShrink:0,width:24,height:24,borderRadius:99,border:`0.5px solid ${C.ink3}`,display:'flex',alignItems:'center',justifyContent:'center',color:C.ink4};
  const labSel  = {...labBase,border:'0.5px solid rgba(255,255,255,.6)',color:C.ink0};

  return (
    <div className="phase" style={{maxWidth:580,margin:'0 auto',padding:'36px 24px 72px'}}>
      <button onClick={goBack} style={{background:'none',border:'none',fontSize:12,color:C.ink4,padding:'0 0 22px',display:'flex',alignItems:'center',gap:5}}>
        ← もどる
      </button>

      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:11}}>
        <span style={{...mono(),fontSize:11,letterSpacing:'.14em',color:C.ink4}}>STEP 2 ／ 診断 Q&amp;A</span>
        <div style={{display:'flex',gap:7,alignItems:'center'}}>
          {['q1','q2','q3','q4'].map(qid => (
            <span key={qid} style={{width:8,height:8,borderRadius:99,background:answers[qid]!==undefined?C.ink7:C.ink0,border:answers[qid]!==undefined?'none':`0.5px solid ${C.ink3}`}}/>
          ))}
        </div>
      </div>

      <div style={{height:4,background:C.ink2,borderRadius:99,overflow:'hidden',marginBottom:46}}>
        <div style={{height:'100%',background:C.ink7,borderRadius:99,width:progressPct,transition:'width .45s ease'}}/>
      </div>

      <div style={{display:'flex',flexDirection:'column',gap:40}}>
        {pageQs.map((q, pi) => (
          <div key={q.id}>
            <div style={{...mono(),fontSize:10,color:C.ink4,letterSpacing:'.12em',marginBottom:8}}>Q{page*2+pi+1} / 4</div>
            <div style={{fontSize:17,fontWeight:700,color:C.ink7,marginBottom:18,lineHeight:1.55}}>{q.title}</div>
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              {q.opts.map((text, idx) => {
                const sel = answers[q.id] === idx;
                return (
                  <button key={idx} className={`btn-option${sel?' selected':''}`} onClick={() => onAnswer(q.id, idx)} style={sel ? optSel : optBase}>
                    <span style={sel ? labSel : labBase}>{String.fromCharCode(65+idx)}</span>
                    <span>{text}</span>
                  </button>
                );
              })}
            </div>
          </div>
        ))}
      </div>

      <div style={{marginTop:36}}>
        <button
          className={canAdvance ? 'btn-primary' : ''}
          onClick={advance}

// ─── Radar chart ─────────────────────────────────────────────────────────────
function RadarChart({ type }) {
  const scores = SCORES_BY_TYPE[type] || SCORES_BY_TYPE['T'];
  const cx = 90, cy = 90, R = 56;
  const ang = i => (-90 + i * 72) * Math.PI / 180;
  const pt = (i, f) => [+(cx + R * f * Math.cos(ang(i))).toFixed(1), +(cy + R * f * Math.sin(ang(i))).toFixed(1)];
  const ringStr = f => scores.map((_,i) => pt(i,f).join(',')).join(' ');
  const dataStr = scores.map((s,i) => pt(i, s.v/100).join(',')).join(' ');
  const labels = scores.map((s,i) => {
    const [x,y] = pt(i,1.35);
    return {x,y,name:s.name,anchor:x<cx-3?'end':x>cx+3?'start':'middle'};
  });

  return (
    <svg viewBox="0 0 180 180" width={186} height={186}>
      {[0.25,0.5,0.75,1].map(f => (
        <polygon key={f} points={ringStr(f)} fill="none" stroke={C.ink2} strokeWidth="0.5"/>
      ))}
      {scores.map((_,i) => {
        const [x,y] = pt(i,1);
        return <line key={i} x1={cx} y1={cy} x2={x} y2={y} stroke={C.ink2} strokeWidth="0.5"/>;
      })}
      <polygon points={dataStr} fill="rgba(20,20,19,0.07)" stroke={C.ink7} strokeWidth="1.2" strokeLinejoin="round"/>
      {labels.map(l => (
        <text key={l.name} x={l.x} y={l.y} textAnchor={l.anchor} fontSize="8.5" fill={C.ink5} dominantBaseline="middle" fontFamily="Noto Sans JP">
          {l.name}
        </text>
      ))}
    </svg>
  );
}

  const dim = 30;
  const maxH = Math.max(...Object.values(HOURS_BY_DAY));
  const studyDayCount = Object.keys(HOURS_BY_DAY).length;
  const hoursTotal = +Object.values(HOURS_BY_DAY).reduce((a,b)=>a+b,0).toFixed(1);

  const calCells = [];
  for (let i = 0; i < first; i++) calCells.push({empty:true});
  for (let d = 1; d <= dim; d++) {
    const h = HOURS_BY_DAY[d] || 0;
    const alpha = h > 0 ? 0.11 + (h/maxH)*0.58 : 0;
    const bg = h > 0 ? `rgba(20,20,19,${alpha.toFixed(2)})` : 'transparent';
    const tc = alpha > 0.42 ? C.ink0 : C.ink5;
    const border = d===21 ? `1.5px solid ${C.ink7}` : `0.5px solid #f0efec`;
    calCells.push({d,h,bg,tc,border});
  }

  return (
    <div className="cal-layout" style={{display:'grid',gridTemplateColumns:'1fr 264px',gap:20,alignItems:'flex-start'}}>
      {/* main calendar */}
      <div style={{background:C.ink0,border:`0.5px solid ${C.ink2}`,borderRadius:4,padding:'26px 24px'}}>
        {/* stats */}
        <div className="cal-stats" style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:26}}>
          {[
            {val:`${studyDayCount}日`,label:'学習日数',sub:'/ 30日'},
            {val:`${hoursTotal}h`,   label:'合計時間',sub:'今月累計'},
            {val:`${(hoursTotal/studyDayCount).toFixed(1)}h`,label:'日平均',sub:'/ 学習日'},
          ].map(s => (
            <div key={s.label} style={{border:`0.5px solid ${C.ink2}`,borderRadius:4,padding:'14px 16px'}}>
              <div style={{...mono(),fontSize:22,fontWeight:500,color:C.ink7,marginBottom:4}}>{s.val}</div>
              <div style={{fontSize:11,color:C.ink4}}>{s.label}</div>
              <div style={{fontSize:10,color:C.ink3,marginTop:2}}>{s.sub}</div>
            </div>
          ))}
        </div>
        <div style={{fontSize:13,fontWeight:700,color:C.ink7,marginBottom:13}}>2026年 6月</div>
        {/* weekday headers */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:5,marginBottom:5}}>
          {['日','月','火','水','木','金','土'].map(w => (
            <span key={w} style={{textAlign:'center',fontSize:10,color:C.ink4}}>{w}</span>
          ))}
        </div>
        {/* day grid */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:5}}>
          {calCells.map((c,i) => c.empty
            ? <div key={i} style={{aspectRatio:'1',border:`0.5px solid transparent`,borderRadius:3}}/>
            : (
              <div key={i} style={{aspectRatio:'1',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:2,borderRadius:3,...mono(),fontSize:11,color:c.tc,background:c.bg,border:c.border}}>
                <span>{c.d}</span>
                {c.h>0 && <span style={{fontSize:9,opacity:.8}}>{c.h}h</span>}
              </div>
            )
          )}
        </div>
        {/* legend */}
        <div style={{display:'flex',alignItems:'center',gap:10,marginTop:16,flexWrap:'wrap'}}>
          <div style={{display:'flex',alignItems:'center',gap:4}}>
            {['#eeede9','rgba(20,20,19,.35)','rgba(20,20,19,.56)','#141413'].map((bg,i) => (
              <span key={i} style={{width:11,height:11,borderRadius:2,background:bg,display:'inline-block',border:i===0?`0.5px solid ${C.ink2}`:'none'}}/>
            ))}
          </div>
          <span style={{fontSize:11,color:C.ink4}}>学習時間（少 → 多）</span>
          <div style={{display:'flex',alignItems:'center',gap:5,marginLeft:8}}>
            <span style={{width:9,height:9,borderRadius:99,border:`1.5px solid ${C.ink7}`,display:'inline-block'}}/>
            <span style={{fontSize:11,color:C.ink5}}>今日 (6/21)</span>
          </div>
        </div>
      </div>

      {/* right sidebar */}
      <div style={{display:'flex',flexDirection:'column',gap:14}}>
        {/* upcoming events */}
        <div style={{background:C.ink0,border:`0.5px solid ${C.ink2}`,borderRadius:4,padding:'22px 20px'}}>
          <div style={{fontSize:13,fontWeight:700,color:C.ink7,marginBottom:18}}>今後の予定</div>
          <div style={{display:'flex',flexDirection:'column',gap:16}}>
            {EVENTS.map(e => (
              <div key={e.date} style={{display:'flex',gap:14,alignItems:'flex-start'}}>
                <div style={{flexShrink:0,textAlign:'center',padding:'7px 9px',background:C.ink1,border:`0.5px solid ${C.ink2}`,borderRadius:3,minWidth:50}}>
                  <div style={{...mono(),fontSize:11.5,color:C.ink7,whiteSpace:'nowrap'}}>{e.date}</div>
                  <div style={{fontSize:10,color:C.ink4,marginTop:2}}>{e.wd}</div>
                </div>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,color:C.ink6,lineHeight:1.5,marginBottom:6}}>{e.label}</div>
                  <span style={{fontSize:10,padding:'2px 9px',borderRadius:3,background:C.ink1,border:`0.5px solid ${C.ink2}`,color:C.ink5,whiteSpace:'nowrap'}}>{e.subject}</span>
                </div>
              </div>
            ))}
          </div>
        </div>
        {/* monthly summary */}
        <div style={{background:C.ink0,border:`0.5px solid ${C.ink2}`,borderRadius:4,padding:20}}>
          <div style={{fontSize:12,fontWeight:700,color:C.ink7,marginBottom:12}}>月次まとめ</div>
          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            {[
              {l:'ベストの連続学習',v:'12日',mono:true},
              {l:'最長学習（1日）', v:'3.0h',mono:true},
              {l:'最多学習科目',    v:'AWS', mono:false},
              {l:'前月比',          v:'+18%',mono:true},
            ].map(r => (
              <div key={r.l} style={{display:'flex',justifyContent:'space-between',fontSize:12}}>
                <span style={{color:C.ink4}}>{r.l}</span>
                <span style={r.mono?{...mono(),color:C.ink7}:{color:C.ink6}}>{r.v}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

      <div className="log-stats" style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12}}>
        {[
          {label:'累計学習',val:'142h'},
          {label:'学習日数',val:'48日'},
          {label:'連続学習',val:'12日'},
          {label:'週平均',  val:'13.5h'},

// ─── Phase 4: Dashboard ───────────────────────────────────────────────────────

  const [tab, setTab] = useState('dashboard');
  const days = daysUntil(2027, 4, 15);
  const typeName = resultType + '型キャリア';

  const TABS = [
    {key:'dashboard', label:'ダッシュボード'},
    {key:'roadmap',   label:'ロードマップ'},
    {key:'calendar',  label:'カレンダー'},
    {key:'log',       label:'学習記録'},
  ];

  const tabBase = {padding:'12px 2px',fontSize:13.5,background:'none',border:'none',marginBottom:-0.5,transition:'color .15s'};

  return (
    <div className="phase" style={{maxWidth:1080,margin:'0 auto',padding:'36px 24px 80px'}}>
      {/* header */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end',gap:24,marginBottom:28,flexWrap:'wrap'}}>
        <div>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:13}}>
            <span style={{fontSize:11,letterSpacing:'.06em',color:C.ink0,background:C.ink7,padding:'4px 11px',borderRadius:3}}>{typeName}</span>
            <span style={{fontSize:12,color:C.ink4}}>田中 優一 さん</span>
            <button onClick={onRestart} style={{background:'none',border:`0.5px solid ${C.ink3}`,borderRadius:3,fontSize:11,color:C.ink4,padding:'3px 10px',marginLeft:4}}>再診断</button>
          </div>
          <h1 style={{fontSize:26,fontWeight:700,color:C.ink7,letterSpacing:'.01em'}}>目標：PMへの転職</h1>
        </div>
        <div style={{textAlign:'right',flexShrink:0}}>
          <div style={{fontSize:11,color:C.ink4,marginBottom:3}}>目標達成まで</div>
          <div style={{...mono(),color:C.ink7,lineHeight:1}}>
            <span style={{fontSize:46,fontWeight:500}}>{days}</span>
            <span style={{fontSize:15,marginLeft:5}}>日</span>
          </div>
          <div style={{fontSize:11,color:C.ink4,marginTop:5}}>2027年4月15日</div>
        </div>
      </div>

      {/* tab nav */}
      <div className="tab-nav" style={{display:'flex',gap:30,borderBottom:`0.5px solid ${C.ink3}`,marginBottom:32}}>
        {TABS.map(t => (
          <button key={t.key} className="tab-btn" onClick={() => setTab(t.key)} style={{
            ...tabBase,
            fontWeight:tab===t.key?500:400,
            color:tab===t.key?C.ink7:C.ink4,
            borderBottom:tab===t.key?`1.5px solid ${C.ink7}`:'1.5px solid transparent',
          }}>
            {t.label}
          </button>
        ))}
      </div>

      {/* tab content */}
      {tab==='dashboard' && <TabDashboard resultType={resultType} completedTasks={completedTasks} onToggleTask={onToggleTask}/>}
      {tab==='roadmap'   && <TabRoadmap/>}
      {tab==='calendar'  && <TabCalendar/>}
      {tab==='log'       && <TabLog/>}
    </div>
  );
}

// ─── App root ─────────────────────────────────────────────────────────────────
function App() {
  const [phase, setPhase] = useState('welcome');
  const [answers, setAnswers] = useState({});
  const [completedTasks, setCompletedTasks] = useState({});

  // persist to localStorage
  useEffect(() => {
    try {
      const saved = JSON.parse(localStorage.getItem('compass-state') || '{}');
      if (saved.phase) {
        setPhase(saved.phase);
        setAnswers(saved.answers || {});
        setCompletedTasks(saved.completedTasks || {});
      }
    } catch(e) {}
  }, []);

  useEffect(() => {
    try {
      localStorage.setItem('compass-state', JSON.stringify({phase, answers, completedTasks}));
    } catch(e) {}
  }, [phase, answers, completedTasks]);

  function go(p) { setPhase(p); window.scrollTo(0, 0); }

  function handleAnswer(qId, idx) {
    setAnswers(prev => ({...prev, [qId]: idx}));
  }

  function handleToggleTask(key, val) {
    setCompletedTasks(prev => ({...prev, [key]: val}));
  }

  function handleRestart() {
    try { localStorage.removeItem('compass-state'); } catch(e) {}
    setPhase('welcome');
    setAnswers({});
    setCompletedTasks({});
    window.scrollTo(0, 0);
  }

  const resultType = calcResultType(answers);

  return (
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',background:'#f5f5f4'}}>
      <TopBar/>
      <main style={{flex:1}}>
        {phase==='welcome'   && <PhaseWelcome onStart={() => go('qa')}/>}
        {phase==='qa'        && (
          <PhaseQa
            answers={answers}
            onAnswer={handleAnswer}
            onBack={() => go('welcome')}
            onFinish={() => go('result')}
          />
        )}
        {phase==='result'    && (
          <PhaseResult
            answers={answers}
            onDashboard={() => go('dashboard')}
            onRestart={handleRestart}
            onBack={() => go('qa')}
          />
        )}
        {phase==='dashboard' && (
          <PhaseDashboard
            resultType={resultType}
            completedTasks={completedTasks}
            onToggleTask={handleToggleTask}
            onRestart={handleRestart}
          />
        )}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
